<!DOCTYPE html>
<html>
<head>
<title>Contact</title>

<style>

body{
margin:0;
font-family:Arial;
background:#fff8fb;
}

.container{
padding:40px;
max-width:500px;
margin:auto;
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #ccc;
}

button{
background:#ff5f93;
color:white;
padding:12px;
border:none;
width:100%;
border-radius:20px;
cursor:pointer;
}

button:hover{
background:#ff2d7a;
}

</style>
</head>

<body>

<div class="container">

<h1>Contact Us</h1>

<form>

<input placeholder="Name">
<input placeholder="Email">
<textarea placeholder="Message"></textarea>

<button type="submit">Send</button>

</form>

</div>

</body>
</html>
