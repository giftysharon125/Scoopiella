<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Matcha Dream</title>

<style>
body {
  margin: 0;
  font-family: "Poppins", Arial, sans-serif;
  background: linear-gradient(135deg, #f0fff0, #e6ffe6);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.flavor-page {
  background: white;
  width: 350px;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  text-align: center;
  transition: 0.3s;
}

.flavor-page:hover {
  transform: translateY(-8px);
}

.flavor-page img {
  width: 100%;
  border-radius: 15px;
}

h1 { color: #2f6f2f; }
p { font-size: 14px; color: #555; }

ul { list-style: none; padding: 0; }

ul li {
  background: #e6ffe6;
  margin: 6px 0;
  padding: 8px;
  border-radius: 10px;
}

.price {
  font-size: 20px;
  font-weight: bold;
  color: #2f6f2f;
}

button {
  background: linear-gradient(135deg, #2f6f2f, #7acb7a);
  border: none;
  padding: 12px 20px;
  color: white;
  border-radius: 25px;
  cursor: pointer;
}
</style>

</head>

<body>

<section class="flavor-page">

<img src="images/flavour2.png">

<h1>Matcha Dream</h1>

<p>Premium Japanese matcha blended with creamy vanilla ice cream.</p>

<h2>Ingredients</h2>
<ul>
<li>Matcha Powder</li>
<li>Fresh Milk</li>
<li>Vanilla Cream</li>
<li>White Chocolate</li>
<li>Green Tea Extract</li>
</ul>

<h2>Price</h2>
<p class="price">₹179</p>

<a href="order.html"><button>Order This Flavor</button></a>

</section>

</body>
</html>
