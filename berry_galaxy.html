<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Berry Galaxy</title>

<style>
body {
  margin: 0;
  font-family: "Poppins", Arial, sans-serif;
  background: linear-gradient(135deg, #f3e6ff, #ffe6f0);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.flavor-page {
  background: white;
  width: 350px;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  text-align: center;
}

.flavor-page img {
  width: 100%;
  border-radius: 15px;
}

h1 { color: #7a3db8; }

ul li {
  background: #f0d9ff;
  margin: 6px 0;
  padding: 8px;
  border-radius: 10px;
}

.price {
  font-size: 20px;
  font-weight: bold;
  color: #7a3db8;
}

button {
  background: linear-gradient(135deg, #7a3db8, #c084f5);
  border: none;
  padding: 12px 20px;
  color: white;
  border-radius: 25px;
}
</style>

</head>

<body>

<section class="flavor-page">

<img src="images/flavour3.png">

<h1>Berry Galaxy</h1>

<p>Cosmic mix of blueberries, raspberries and strawberry swirl.</p>

<h2>Ingredients</h2>
<ul>
<li>Blueberries</li>
<li>Raspberries</li>
<li>Strawberry Puree</li>
<li>Milk Cream</li>
<li>Vanilla Base</li>
</ul>

<h2>Price</h2>
<p class="price">₹189</p>

<a href="order.html"><button>Order This Flavor</button></a>

</section>

</html>
